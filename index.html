<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Happy Birthday Mission</title>

  <style>
    :root {
      --bg: #020608;
      --grid: rgba(0, 255, 255, 0.06);
      --cyan: #30f2ff;
      --cyan-dim: rgba(48, 242, 255, 0.78);
      --cyan-soft: rgba(48, 242, 255, 0.18);
      --panel: rgba(3, 12, 18, 0.72);
      --panel-border: rgba(48, 242, 255, 0.18);
      --btn-bg: rgba(0, 255, 255, 0.08);
      --btn-hover: rgba(0, 255, 255, 0.16);
      --shadow: 0 0 8px rgba(48, 242, 255, 0.3), 0 0 18px rgba(48, 242, 255, 0.14);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --footer-h: 56px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #010507;
      font-family: "Courier New", "Lucida Console", monospace;
    }

    body {
      color: var(--cyan);
      background:
        linear-gradient(rgba(0,0,0,0.16), rgba(0,0,0,0.3)),
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 27px,
          var(--grid) 28px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 27px,
          var(--grid) 28px
        ),
        radial-gradient(circle at top left, rgba(0,255,255,0.06), transparent 30%),
        #010507;
      text-shadow:
        0 0 4px rgba(48, 242, 255, 0.7),
        0 0 10px rgba(48, 242, 255, 0.25);
    }

    #app {
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      overflow: hidden;
      padding:
        calc(16px + var(--safe-top))
        calc(20px + var(--safe-right))
        calc(16px + var(--safe-bottom))
        calc(20px + var(--safe-left));
      display: flex;
      align-items: stretch;
      justify-content: center;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: none;
    }

    .screen.active {
      display: flex;
    }

    .frame {
      width: 100%;
      height: 100%;
      border: 2px solid rgba(48, 242, 255, 0.15);
      box-shadow:
        inset 0 0 0 1px rgba(48, 242, 255, 0.05),
        0 0 30px rgba(0, 255, 255, 0.08);
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0)),
        rgba(1, 8, 12, 0.4);
      position: relative;
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.022) 0px,
          rgba(255,255,255,0.022) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.18;
      mix-blend-mode: screen;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 26px 30px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topline {
      font-size: clamp(16px, 1.6vw, 24px);
      letter-spacing: 2px;
      opacity: 0.95;
    }

    .center-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .start-panel,
    .cards-panel {
      position: relative;
      overflow: hidden;
    }

    .start-panel::after,
    .cards-panel::after,
    .pixel-card-face::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0, 255, 255, 0.035) 0px,
          rgba(0, 255, 255, 0.035) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.22;
    }

    .start-panel {
      width: min(980px, 92%);
      padding: clamp(26px, 3vw, 42px);
      border: 2px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .hero-title {
      font-size: clamp(34px, 4.6vw, 66px);
      line-height: 1.2;
      letter-spacing: 2px;
      margin: 0;
    }

    .hero-sub {
      font-size: clamp(16px, 1.8vw, 28px);
      color: var(--cyan-dim);
      margin: 0;
      line-height: 1.6;
    }

    .glow-btn {
      border: 2px solid rgba(48, 242, 255, 0.3);
      background: var(--btn-bg);
      color: var(--cyan);
      padding: 16px 28px;
      min-width: 180px;
      min-height: 58px;
      font-size: clamp(16px, 1.5vw, 22px);
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      touch-action: manipulation;
    }

    .glow-btn:active {
      transform: scale(0.97);
    }

    .glow-btn:hover {
      background: var(--btn-hover);
      box-shadow:
        0 0 10px rgba(48, 242, 255, 0.4),
        0 0 24px rgba(48, 242, 255, 0.2);
    }

    .footer-strip {
      height: var(--footer-h);
      background: var(--cyan);
      color: #02181d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      font-size: clamp(13px, 1.3vw, 22px);
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: none;
      flex-shrink: 0;
      gap: 16px;
    }

    .footer-left,
    .footer-right {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .music-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: #02181d;
      font: inherit;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      padding: 0;
      min-width: 88px;
      text-align: left;
      text-shadow: none;
    }

    .music-btn:hover {
      opacity: 0.72;
    }

    .music-indicator {
      display: inline-block;
      min-width: 88px;
    }

    .cards-page {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      min-height: 0;
    }

    .cards-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .cards-title {
      margin: 0;
      font-size: clamp(20px, 2.1vw, 34px);
      letter-spacing: 1px;
      line-height: 1.4;
    }

    .cards-tip {
      margin: 4px 0 0;
      font-size: clamp(13px, 1.1vw, 18px);
      color: var(--cyan-dim);
    }

    .cards-panel {
      flex: 1;
      min-height: 0;
      border: 2px solid var(--panel-border);
      background: rgba(3, 12, 18, 0.62);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cards-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(12px, 1.4vw, 20px);
      align-items: center;
    }

    .card-wrap {
      perspective: 1400px;
      width: 100%;
      height: 100%;
      min-height: 290px;
      max-height: 100%;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.78s cubic-bezier(.2,.8,.2,1);
      cursor: pointer;
      touch-action: manipulation;
      background: transparent;
      border: 0;
      padding: 0;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.locked {
      cursor: default;
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
      border: 2px solid rgba(48, 242, 255, 0.22);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 18px rgba(48, 242, 255, 0.12);
    }

    .card-back {
      background:
        linear-gradient(180deg, rgba(0,255,255,0.08), rgba(0,0,0,0.3)),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 2px,
          transparent 4px
        ),
        linear-gradient(135deg, rgba(0,255,255,0.08), rgba(0,255,255,0.02) 35%, rgba(0,0,0,0.35));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .card-back-inner {
      width: 100%;
      height: 100%;
      border: 2px dashed rgba(48, 242, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      font-size: clamp(18px, 1.8vw, 28px);
      line-height: 1.5;
      letter-spacing: 2px;
      color: var(--cyan);
    }

    .pixel-card-face {
      transform: rotateY(180deg);
      background:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.3)),
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 18px,
          rgba(0,255,255,0.04) 19px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 18px,
          rgba(0,255,255,0.04) 19px
        ),
        radial-gradient(circle at top left, rgba(0,255,255,0.08), transparent 28%),
        #030b0f;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .pixel-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(48, 242, 255, 0.18);
      font-size: 11px;
      color: var(--cyan-dim);
      letter-spacing: 1px;
      background: rgba(0, 255, 255, 0.03);
      z-index: 1;
    }

    .pixel-card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
      min-height: 0;
      z-index: 1;
    }

    .pixel-image-wrap {
      flex: 0 0 48%;
      min-height: 110px;
      border: 1px solid rgba(48, 242, 255, 0.18);
      background: rgba(0, 255, 255, 0.02);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .gift-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.95) contrast(1.02);
    }

    .pixel-copy {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 8px;
      min-height: 0;
    }

    .gift-title {
      margin: 0;
      font-size: clamp(14px, 1.15vw, 18px);
      line-height: 1.45;
      color: var(--cyan);
      font-weight: 700;
    }

    .gift-subtitle {
      margin: 0;
      font-size: clamp(12px, 0.95vw, 14px);
      line-height: 1.5;
      color: var(--cyan-dim);
    }

    .status-text {
      position: absolute;
      left: 22px;
      bottom: 18px;
      font-size: clamp(11px, 0.95vw, 15px);
      color: var(--cyan-dim);
      letter-spacing: 1px;
      z-index: 2;
    }

    audio {
      display: none;
    }

    @media (max-width: 1180px) {
      .cards-grid {
        gap: 12px;
      }

      .card-wrap {
        min-height: 245px;
      }
    }

    @media (max-width: 980px) and (orientation: landscape) {
      .page {
        padding: 20px 20px 10px;
      }

      .card-wrap {
        min-height: 220px;
      }

      .gift-title {
        font-size: 13px;
      }

      .gift-subtitle {
        font-size: 11px;
      }

      .footer-strip {
        height: 50px;
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="screen active" id="screen-start">
      <div class="frame">
        <div class="page">
          <div class="topline">PORT 502: OPEN</div>

          <div class="center-wrap">
            <div class="start-panel">
              <h1 class="hero-title">Happy Birthday!</h1>
              <p class="hero-sub">小魚醬準備好接收這項任務了嗎?</p>
              <div>
                <button class="glow-btn" id="startBtn">下一步</button>
              </div>
            </div>
          </div>

          <div class="footer-strip">
            <div class="footer-left">
              <button id="musicBtn" class="music-btn" type="button">
                <span class="music-indicator">▶ MUSIC</span>
              </button>
            </div>

            <div class="footer-right">
              <span>2026-03-25</span>
              <span>00:00AM</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="screen" id="screen-cards">
      <div class="frame">
        <div class="page cards-page">
          <div class="cards-header">
            <div>
              <h2 class="cards-title">[MISSION 29]</h2>
              <p class="cards-tip">請選擇一張卡牌，每次限翻一張</p>
            </div>
            <button class="glow-btn" id="resetBtn">再來一次</button>
          </div>

          <div class="cards-panel">
            <div class="cards-grid" id="cardsGrid"></div>
            <div class="status-text" id="statusText">MISSION 29 STATUS [IN PROGRESS]</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="bgm" loop preload="auto" playsinline webkit-playsinline>
    <source src="bgm.mp3" type="audio/mpeg" />
  </audio>

  <audio id="flipSound" preload="auto" playsinline webkit-playsinline>
    <source src="dragon-studio.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const originalGifts = [
      {
        id: 1,
        title: "幫小魚把體驗值拉滿✨",
        subtitle: "首爾來回機票贊助金 5000 元",
        image: "gift1.jpg"
      },
      {
        id: 2,
        title: "小魚⋯好像該開始認真了（？）",
        subtitle: "bigboss 團課 12 堂",
        image: "gift2.jpg"
      },
      {
        id: 3,
        title: "猶豫不決？讓小魚去日本再想一下好了",
        subtitle: "東京 / 河口湖購物贊助金 日幣 2 萬元",
        image: "gift3.jpg"
      },
      {
        id: 4,
        title: "小璇親自出動為小魚服務",
        subtitle: "plave 快閃店排隊",
        image: "gift4.jpg"
      }
    ];

    const screenStart = document.getElementById("screen-start");
    const screenCards = document.getElementById("screen-cards");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const cardsGrid = document.getElementById("cardsGrid");
    const statusText = document.getElementById("statusText");
    const bgm = document.getElementById("bgm");
    const flipSound = document.getElementById("flipSound");
    const musicBtn = document.getElementById("musicBtn");
    const musicIndicator = musicBtn.querySelector(".music-indicator");

    let hasFlipped = false;
    let gifts = [];
    let bgmStarted = false;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateStatusDefault() {
      statusText.textContent = "MISSION 29 STATUS [IN PROGRESS]";
    }

    function updateStatusComplete() {
      statusText.textContent = "MISSION 29 STATUS [MISSION COMPLETE]";
    }

    function renderCards() {
      cardsGrid.innerHTML = "";
      hasFlipped = false;
      updateStatusDefault();

      gifts = shuffle(originalGifts);

      gifts.forEach((gift, index) => {
        const wrap = document.createElement("div");
        wrap.className = "card-wrap";

        const card = document.createElement("button");
        card.className = "card";
        card.type = "button";
        card.setAttribute("aria-label", `第 ${index + 1} 張禮物卡`);

        card.innerHTML = `
          <div class="card-face card-back">
            <div class="card-back-inner">ACCESS<br>GIFT_${index + 1}</div>
          </div>

          <div class="card-face pixel-card-face">
            <div class="pixel-card-top">
              <span>PORT 502</span>
              <span>[MISSION COMPLETE]</span>
            </div>

            <div class="pixel-card-body">
              <div class="pixel-image-wrap">
                <img class="gift-image" src="${gift.image}" alt="${gift.subtitle}">
              </div>

              <div class="pixel-copy">
                <p class="gift-title">${gift.title}</p>
                <p class="gift-subtitle">${gift.subtitle}</p>
              </div>
            </div>
          </div>
        `;

        card.addEventListener("click", () => handleFlip(card));
        wrap.appendChild(card);
        cardsGrid.appendChild(wrap);
      });
    }

    function handleFlip(card) {
      if (hasFlipped) return;
      if (card.classList.contains("flipped")) return;

      hasFlipped = true;
      card.classList.add("flipped");
      card.classList.add("locked");
      playFlipSound();
      updateStatusComplete();
      lockOtherCards(card);
    }

    function lockOtherCards(activeCard) {
      const allCards = document.querySelectorAll(".card");
      allCards.forEach(card => {
        if (card !== activeCard) {
          card.classList.add("locked");
        }
      });
    }

    function resetCards() {
      renderCards();
    }

    function showCardsPage() {
      screenStart.classList.remove("active");
      screenCards.classList.add("active");
    }

    async function playBgm() {
      try {
        bgm.volume = 0.55;
        const p = bgm.play();
        if (p) await p;
        bgmStarted = true;
        musicIndicator.textContent = "❚❚ MUSIC";
      } catch (err) {
        console.warn("背景音樂播放失敗：", err);
      }
    }

    function pauseBgm() {
      bgm.pause();
      musicIndicator.textContent = "▶ MUSIC";
    }

    async function toggleBgm() {
      if (bgm.paused) {
        await playBgm();
      } else {
        pauseBgm();
      }
    }

    function playFlipSound() {
      try {
        flipSound.pause();
        flipSound.currentTime = 0;
        flipSound.volume = 0.55;
        flipSound.play();
      } catch (err) {
        console.warn("翻牌音效播放失敗：", err);
      }
    }

    musicBtn.addEventListener("click", async () => {
      await toggleBgm();
    });

    startBtn.addEventListener("click", async () => {
      showCardsPage();
      renderCards();

      if (bgm.paused && !bgmStarted) {
        await playBgm();
      }
    });

    resetBtn.addEventListener("click", () => {
      resetCards();
      if (!bgm.paused) {
        // 保持背景音樂持續播放
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (!document.hidden && bgmStarted && bgm.paused) {
        try {
          await bgm.play();
          musicIndicator.textContent = "❚❚ MUSIC";
        } catch (err) {
          console.warn("返回頁面後背景音樂恢復失敗：", err);
        }
      }
    });

    renderCards();
  </script>
</body>
</html>
